name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .[dev]
      - run: make seed
      - run: make fetch
      - run: make parse
      - run: make purge-stub-controls
      - run: make geo-audit
      - run: make panel
      - run: make analysis
      - run: make validate-geo
      - run: make validate-sprint
      - run: make main-tables
      - run: make sync-paper-stats
      - run: pytest -q
