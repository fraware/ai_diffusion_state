name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .[dev]
      - run: make seed
      - run: make fetch
      - run: make parse
      - run: make purge-stub-controls
      - run: make geo-audit
      - run: make panel
      - run: make analysis
      - run: make public-fallback-controls
      - run: make validate-geo
      - run: make main-tables
      - run: make sync-paper-stats
      - run: make production-check
      - run: make validate-draft
      - run: make paper-figures
      - run: make paper-tables
      - run: make export-submission
      - run: make submission-bundle
      - run: make submission-checklist
      - run: make validate-submission
      - run: make validate-audit
      - run: make validate-sprint
      - run: make paper
      - run: python scripts/15_pcs_status.py --json
      - run: pytest -q
