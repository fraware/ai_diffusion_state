    license_or_terms: "CEPII terms; manual download"
    local_path: "data/raw/baci/"
    notes: "Use HS17 for 2017–2024. Place yearly BACI_HS17_Y*_V*.csv files in local_path."

  eps_city_statistics:
    name: "EPS China City Statistics"
    source_type: commercial
    url: "https://epschinastats.com/db_city.html"
