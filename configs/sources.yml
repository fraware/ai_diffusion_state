    expected_format: xlsx
    license_or_terms: "Institutional subscription required"
    local_path: "data/raw/city_controls/"
    notes: "Preferred city-year controls; substitute NBS yearbooks if unavailable."

  deepinnovation_ai:
    name: "DeepInnovationAI patent dataset"
    source_type: academic
    url: "https://figshare.com/articles/dataset/_/28578947"
    accessed_at: null
    expected_format: zip
    license_or_terms: "Figshare dataset terms"
    local_path: "data/raw/deepinnovationai/"
    notes: "Tier 2 validation only."
