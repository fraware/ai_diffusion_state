# Diffusion State research source registry
# Each entry: name, source_type, url, accessed_at, expected_format, license_or_terms, local_path, notes

sources:
  ai_pilot_zones_cset:
    name: "CSET — China AI Innovation and Development Pilot Zones"
    source_type: academic
    url: "https://cset.georgetown.edu/publication/china-creates-national-new-generation-artificial-intelligence-innovation-and-development-pilot-zones/"
    accessed_at: "2026-05-19"
    expected_format: html
    license_or_terms: "Public web page; cite CSET and underlying MOST sources"
    local_path: "data/seed/pilot_zones_seed.csv"
    notes: "First 11 zones with creation/announcement dates. Feeds treatment seed."

  ai_pilot_zones_xinhua_17:
    name: "Xinhua — 17 national AI pilot zones (Dec 2021)"
    source_type: official
    url: "https://www.news.cn/2021-12/06/c_1128137133.htm"
    accessed_at: "2026-05-19"
    expected_format: html
    license_or_terms: "Public news report"
    local_path: "data/seed/pilot_zones_seed.csv"
    notes: "Validates full 17-zone list. Seed uses jjckb mirror for Guangzhou–Shenyang rows."

  miit_smart_factory_2024_first_batch_notice:
    name: "MIIT 2024 excellence smart-factory notice (NCSTI mirror)"
    source_type: official
    url: "https://www.ncsti.gov.cn/kjdt/tzgg/202501/t20250103_191636.html"
    accessed_at: null
    expected_format: html
    license_or_terms: "Government publication"
    local_path: "data/raw/smart_factories/2024_notice.html"
    notes: "Official notice; target N=235 first batch. May require attachment parsing."

  miit_smart_factory_2024_first_batch_mirror:
    name: "Solarbe mirror — 2024 smart-factory list"
    source_type: mirror
    url: "https://cn.solarbe.com/news/20250103/92225.html"
    accessed_at: "2026-05-19"
    expected_format: html
    license_or_terms: "Third-party mirror; reconcile to official count"
    local_path: "data/raw/smart_factories/2024_mirror.html"
    notes: "235 <p> rows; one row per project. Primary 2024 parse source in pipeline."

  miit_smart_factory_2025_jlts_table:
    name: "JLT policy — 2025 excellence smart-factory list (HTML table)"
    source_type: mirror
    url: "https://jlts.com.cn/i/news/detail/2571072131159669662.html"
    accessed_at: "2026-05-19"
    expected_format: html
    license_or_terms: "Public mirror; cites MIIT 2025 notice"
    local_path: "data/raw/smart_factories/2025_jlts.html"
    notes: "Embedded HTML table; 274 projects. Primary 2025 parse source in pipeline."

  baci_cepii:
    name: "CEPII BACI"
    source_type: academic
    url: "https://www.cepii.fr/CEPII/en/bdd_modele/bdd_modele_item.asp?id=37"
